<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        nav {
            background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 50%, #a855f7 100%);
            border-bottom: 2px solid #a855f7;
            box-shadow: 0 0 10px #a855f7;
            padding: 15px 0;
        }
        nav .nav-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            gap: 30px;
        }
        nav .logo a {
            color: #ffffff;
            text-shadow: 0 0 10px #a855f7;
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 900;
        }
        nav .logo a:hover { color: #ffffff; }
        nav .links { display: flex; gap: 20px; flex: 1; }
        nav .links a {
            color: #ffffff;
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            text-shadow: 0 0 5px #a855f7;
            transition: all 0.3s;
        }
        nav .links a:hover {
            color: #ffff00;
            text-shadow: 0 0 10px #ffff00;
        }

        /* Hamburger button - hidden on desktop */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            margin-left: auto;
            background: none;
            border: none;
            padding: 4px;
        }
        .hamburger span {
            display: block;
            width: 24px;
            height: 2px;
            background: #ffffff;
            border-radius: 2px;
            transition: all 0.3s;
        }

        /* Mobile dropdown menu */
        .mobile-menu {
            display: none;
            flex-direction: column;
            background: linear-gradient(135deg, #5b21b6 0%, #7c3aed 100%);
            border-top: 1px solid rgba(168, 85, 247, 0.5);
            padding: 10px 20px;
            gap: 12px;
        }
        .mobile-menu a {
            color: #ffffff;
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            text-shadow: 0 0 5px #a855f7;
            padding: 6px 0;
            border-bottom: 1px solid rgba(168, 85, 247, 0.2);
        }
        .mobile-menu a:last-child { border-bottom: none; }
        .mobile-menu a:hover {
            color: #ffff00;
            text-shadow: 0 0 10px #ffff00;
        }
        .mobile-menu.open { display: flex; }

        @media (max-width: 600px) {
            body { overflow: visible; }
            nav .links { display: none; }
            .hamburger { display: flex; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-content">
            <div class="logo"><a href="Gambit.html" target="_top">GAMBIT</a></div>
            <div class="links">
                <a href="index.html" target="_top">Home</a>
                <a href="linktree.html" target="_top">Linktree</a>
                <a href="CoolWebsites.html" target="_top">Cool Websites</a>
                <a href="Games.html" target="_top">Games</a>
            </div>
            <button class="hamburger" onclick="toggleMenu()" aria-label="Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>
    <div class="mobile-menu" id="mobile-menu">
        <a href="index.html" target="_top">Home</a>
        <a href="linktree.html" target="_top">Linktree</a>
        <a href="CoolWebsites.html" target="_top">Cool Websites</a>
        <a href="Games.html" target="_top">Games</a>
    </div>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('open');
            // Tell the parent page to resize the iframe
            const newHeight = document.body.scrollHeight;
            window.parent.postMessage({ iframeHeight: newHeight }, '*');
        }
    </script>
</body>
</html>
